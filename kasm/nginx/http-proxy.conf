map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
upstream kasm_https {
    server 127.0.0.1:9443;
}

# Kasm hardcodes https:// for VNC iframes — patch bundle when served over HTTP :8090
map $uri $adept_bundle_patch {
    default 0;
    ~^/index\.bundle\.js 1;
}

server {
    listen 0.0.0.0:8090;
    server_name _;
    client_max_body_size 1G;

    location /branding/ {
        alias /home/ubuntu/workspace/kasm/branding/;
        add_header Cache-Control "public, max-age=3600";
    }

    # Branding API only (do not sub_filter all JSON — breaks session APIs)
    location = /api/login_settings {
        proxy_pass https://kasm_https;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter '"html_title": "Kasm Workspaces"' '"html_title": "Adept Engineering Solutions"';
        sub_filter '"login_splash_background": "/img/login_splash.jpg"' '"login_splash_background": "/branding/login-splash.svg"';
        sub_filter '"login_caption": "The Container Streaming Platform\u00ae"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"login_caption": "The Container Streaming Platform®"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"login_caption": "Secure virtual workspaces for your team"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"loading_session_text": "Creating a secure connection..."' '"loading_session_text": "Loading your Adept workspace…"';
        sub_filter '"joining_session_text": "Creating a secure connection..."' '"joining_session_text": "Joining session…"';
        sub_filter '"destroying_session_text": "Destroying session..."' '"destroying_session_text": "Ending session…"';
    }

    location / {
        proxy_pass https://kasm_https;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Strict-Transport-Security;
        proxy_buffering on;

        proxy_set_header Accept-Encoding "";
        sub_filter_types text/html application/javascript;
        sub_filter_once off;

        # HTML branding
        sub_filter '<title></title>' '<title>Adept Engineering Solutions</title>';
        sub_filter '<title>Kasm Workspaces</title>' '<title>Adept Engineering Solutions</title>';
        sub_filter '"name": "Kasm Workspaces"' '"name": "Adept Engineering Solutions"';
        sub_filter '<meta name="theme-color" content="#000000"/>' '<meta name="theme-color" content="#01509A"/>';
        sub_filter '</head>' '<link rel="stylesheet" href="/branding/adept.css?v=4"><link rel="icon" href="/branding/favicon.png" type="image/png"><script defer src="/branding/adept.js?v=4"></script></head>';

        # CE bundles stream URLs as https:// even on HTTP :8090 — use page protocol
        sub_filter '"https://".concat(o.hostname,":").concat(o.port_map.vnc.port' 'window.location.protocol+"//".concat(o.hostname,":").concat(o.port_map.vnc.port';
        sub_filter '"https://".concat(t.hostname,":").concat(t.port_map.vnc.port' 'window.location.protocol+"//".concat(t.hostname,":").concat(t.port_map.vnc.port';
        sub_filter '"https://".concat(n.props.statusKasms.hostname,":")' 'window.location.protocol+"//".concat(n.props.statusKasms.hostname,":")';
        sub_filter '"https://".concat(r.hostname,":")' 'window.location.protocol+"//".concat(r.hostname,":")';
        sub_filter '"wss://".concat(n.hostname,":")' '(window.location.protocol==="https:"?"wss:":"ws:")+"//".concat(n.hostname,":")';
        sub_filter '"wss://".concat(e.hostname,":")' '(window.location.protocol==="https:"?"wss:":"ws:")+"//".concat(e.hostname,":")';
    }
}
