# Bootstrap HTTP-only config for ACME before certificates exist.
# Replaced by workspaces.adeptengr.com.conf after cert issuance.

server {
    listen 80;
    listen [::]:80;
    server_name workspaces.adeptengr.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot/workspaces.adeptengr.com;
        allow all;
    }

    location / {
        return 200 'Adept Workspaces — awaiting TLS certificate\n';
        add_header Content-Type text/plain;
    }
}
