# Adept Kasm Workspaces — host nginx (TLS terminates here, proxies to Kasm :9443)
# Cert symlinks: /etc/nginx/ssl/workspaces.adeptengr.com/{fullchain.crt,private.key}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream adept_kasm_https {
    server 127.0.0.1:9443;
}

# HTTP :80 — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name workspaces.adeptengr.com;

    client_max_body_size 1G;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot/workspaces.adeptengr.com;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — public entry (fixes Kasm hardcoded https:// stream URLs)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name workspaces.adeptengr.com;

    ssl_certificate     /etc/nginx/ssl/workspaces.adeptengr.com/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/workspaces.adeptengr.com/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size    1G;
    client_body_timeout     3600s;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
    proxy_connect_timeout   300s;

    # Adept branding assets (served locally, not from Kasm)
    location /branding/ {
        alias /home/ubuntu/workspace/kasm/branding/;
        add_header Cache-Control "public, max-age=3600";
    }

    # Branding API only — never sub_filter all JSON (breaks session APIs)
    location = /api/login_settings {
        proxy_pass https://adept_kasm_https;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter '"html_title": "Kasm Workspaces"' '"html_title": "Adept Engineering Solutions"';
        sub_filter '"login_splash_background": "/img/login_splash.jpg"' '"login_splash_background": "/branding/login-splash.svg"';
        sub_filter '"login_caption": "The Container Streaming Platform\u00ae"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"login_caption": "The Container Streaming Platform®"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"login_caption": "Secure virtual workspaces for your team"' '"login_caption": "Secure virtual workspaces for teams"';
        sub_filter '"loading_session_text": "Creating a secure connection..."' '"loading_session_text": "Loading your Adept workspace…"';
        sub_filter '"joining_session_text": "Creating a secure connection..."' '"joining_session_text": "Joining session…"';
        sub_filter '"destroying_session_text": "Destroying session..."' '"destroying_session_text": "Ending session…"';
    }

    location / {
        proxy_pass https://adept_kasm_https;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering on;
        proxy_set_header Accept-Encoding "";

        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter '<title></title>' '<title>Adept Engineering Solutions</title>';
        sub_filter '<title>Kasm Workspaces</title>' '<title>Adept Engineering Solutions</title>';
        sub_filter '"name": "Kasm Workspaces"' '"name": "Adept Engineering Solutions"';
        sub_filter '<meta name="theme-color" content="#000000"/>' '<meta name="theme-color" content="#01509A"/>';
        sub_filter '</head>' '<link rel="stylesheet" href="/branding/adept.css?v=6"><link rel="icon" href="/branding/favicon.png" type="image/png"><script defer src="/branding/adept.js?v=6"></script></head>';
    }
}

# Retire plain HTTP :8090 — redirect to canonical HTTPS URL
server {
    listen 8090;
    listen [::]:8090;
    server_name workspaces.adeptengr.com _;
    return 301 https://workspaces.adeptengr.com$request_uri;
}
